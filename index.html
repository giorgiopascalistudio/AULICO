<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <!-- Auto-recupero "pagina bianca da cache": se il browser serve un index.html
         vecchio (cache GitHub Pages) il cui bundle JS non esiste più dopo un deploy,
         il caricamento del modulo dà 404. Qui lo intercettiamo e ricarichiamo UNA
         volta ignorando la cache → prende la versione nuova. Flag tecnico di sessione
         (non sono dati), azzerato a boot avvenuto in main.tsx. -->
    <script>
      (function () {
        window.addEventListener('error', function (e) {
          var el = e && e.target;
          if (!el || el.tagName !== 'SCRIPT') return;
          if (String(el.src || '').indexOf('/assets/index-') === -1) return;
          try {
            if (sessionStorage.getItem('aulicoStaleReload')) return;
            sessionStorage.setItem('aulicoStaleReload', '1');
          } catch (_) {}
          location.reload();
        }, true);
      })();
    </script>
    <!-- Zoom disabilitato (pinch/double-tap); il blocco desktop (ctrl+rotella/+/-) è in main.tsx -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Aulico</title>
    <meta name="description" content="Aulico — piattaforma di gruppo: Onirico, Materico, Unico e Strategico. Progetti, cantieri, finanza, CRM e portale clienti." />
    <!-- Icona app: tab browser + "Aggiungi a Home" su iOS/Android -->
    <link rel="icon" type="image/jpeg" href="/apple-touch-icon.jpg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.jpg" />
    <meta name="apple-mobile-web-app-title" content="Aulico" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#161616" />
    <!-- Preconnect: font Typekit + endpoint Firebase (auth + Realtime DB) → handshake anticipato su mobile -->
    <link rel="preconnect" href="https://use.typekit.net" crossorigin />
    <link rel="preconnect" href="https://p.typekit.net" crossorigin />
    <link rel="preconnect" href="https://aulico-228bd-default-rtdb.europe-west1.firebasedatabase.app" />
    <link rel="preconnect" href="https://identitytoolkit.googleapis.com" />
    <link rel="preconnect" href="https://securetoken.googleapis.com" />
    <!-- CSS Typekit caricato in modo NON bloccante (media="print" → "all" all'onload); fallback per no-JS -->
    <link rel="stylesheet" href="https://use.typekit.net/nqt2bdv.css" media="print" onload="this.media='all'" />
    <noscript><link rel="stylesheet" href="https://use.typekit.net/nqt2bdv.css" /></noscript>
  </head>
  <body>
    <div id="root"></div>
    <!-- AI assist (Strategico) via Worker Cloudflare gratis (Gemini). Vedi cloudflare-worker/. -->
    <script>window.__AULICO_AI_URL__ = 'https://aulico-ai.giorgiopascali.workers.dev';</script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
